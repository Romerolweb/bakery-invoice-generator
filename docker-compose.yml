services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "${PORT:-9002}:${PORT:-9002}"
    environment:
      NODE_ENV: development
      PORT: ${PORT:-9002}
      DATABASE_URL: postgres://bakery:bakery@postgres:5432/bakery
    env_file:
      - .env.dev
    volumes:
      - .:/app # Mount the host directory to the container for live updates in dev
      - /app/node_modules # Exclude node_modules from the mount to use container's version
      - pdf_data:/app/src/lib/data/receipt-pdfs # Named volume for persistent PDF storage
    # Run as 'node' user (UID 1000 typically). Ensure host's ./src/lib/data is writable by this UID for mkdir.
    user: "node"
    working_dir: /app
    # Create PDF directory and start dev server
    command: sh -c "mkdir -p src/lib/data/receipt-pdfs && npm run dev"
    depends_on:
      postgres:
        condition: service_healthy
    develop:
      watch:
        - action: sync
          path: ./src
          target: /app/src
          ignore:
            - node_modules/
        - action: sync
          path: ./public
          target: /app/public
          ignore:
            - node_modules/
        - action: rebuild
          path: package.json
        - action: rebuild
          path: package-lock.json # Add if you use npm and have this file
        - action: rebuild
          path: next.config.ts
        - action: rebuild
          path: tsconfig.json

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: bakery
      POSTGRES_PASSWORD: bakery
      POSTGRES_DB: bakery
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - '5432:5432'
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bakery"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pdf_data: # Defines the named volume for storing generated PDFs
  pgdata: # Defines the named volume for PostgreSQL data

